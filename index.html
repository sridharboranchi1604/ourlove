<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    color: white;
}

/* Background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(4px) brightness(0.6);
    transition: opacity 1.5s;
    animation: zoom 12s ease-in-out infinite;
    z-index: -2;
}

@keyframes zoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
}

/* Center text */
.center-box {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* Message */
#message {
    font-size: clamp(22px, 6vw, 42px);
    line-height: 1.6;
    max-width: 90%;
    opacity: 0;
    transition: opacity 1s;
}

.highlight {
    color: #ffd700;
    font-size: clamp(28px, 7vw, 50px);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
}

/* Start Button */
#startBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 24px;
    border-radius: 30px;
    border: none;
    background: #ffd700;
    color: black;
    font-size: 1.1rem;
    cursor: pointer;
    z-index: 10;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="center-box">
    <div id="message"></div>
</div>

<button id="startBtn" onclick="startExperience()">▶️ Start</button>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const lines = [
"I know sometimes it feels like my love is becoming less...",
"But honestly, it's just life getting a little messy, not my heart.",
"My love for you is still the same… actually more ❤️",
"Like Krishna and Radha… love is not always loud, sometimes it's silent, deep, and always there.",
"Yes, I get lazy sometimes 😅 but one thing never changes —",
"You.",
"I may not always get it right, but I don’t want to lose you.",
"I will understand you better, and make you smile everyday 💖",
"And one truth… I never delay loving you ❤️"
];

const backgrounds = [
"img1.jpeg","img2.jpeg","img3.jpeg","img4.jpeg",
"img5.jpeg","img6.jpeg","img7.jpeg","img8.jpeg"
];

let index = 0;
let bgIndex = 0;
let currentBg = 1;

/* Background change */
function changeBackground() {
    let next = currentBg === 1 ? 2 : 1;

    document.getElementById("bg"+next).style.backgroundImage =
        `url(${backgrounds[bgIndex]})`;

    document.getElementById("bg"+next).style.opacity = 1;
    document.getElementById("bg"+currentBg).style.opacity = 0;

    currentBg = next;
    bgIndex = (bgIndex + 1) % backgrounds.length;
}

/* Show lines */
function showNextLine() {
    const msg = document.getElementById("message");

    if (index >= lines.length) {
        setTimeout(() => {
            msg.style.opacity = 0;

            setTimeout(() => {
                msg.innerText = "I mean this, KADU… always ❤️";
                msg.classList.add("highlight");
                msg.style.opacity = 1;
            }, 800);

        }, 1500);
        return;
    }

    msg.style.opacity = 0;

    setTimeout(() => {
        msg.innerText = lines[index];

        if (lines[index] === "You.") {
            msg.classList.add("highlight");
        } else {
            msg.classList.remove("highlight");
        }

        msg.style.opacity = 1;

        changeBackground();

        index++;
        setTimeout(showNextLine, 4000);

    }, 800);
}

/* Hearts */
function startHearts() {
    setInterval(()=>{
        let h=document.createElement("div");
        h.innerHTML="💛";
        h.className="heart";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

/* Start with smooth audio fade */
function startExperience() {
    const music = document.getElementById("bgMusic");
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);

    document.getElementById("startBtn").style.display = "none";

    changeBackground();
    showNextLine();
    startHearts();
}
</script>

</body>
</html>

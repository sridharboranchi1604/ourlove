<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #f5e6c8;
    text-align: center;
    overflow-x: hidden;
}

/* FULLSCREEN BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: opacity 1.5s ease-in-out;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Content */
.container {
    margin-top: 60px;
    padding: 20px;
}

h1 {
    font-size: 2.5rem;
    color: #ffd700;
}

.tap-msg {
    font-size: 0.9rem;
    color: #ccc;
}

#message {
    margin-top: 20px;
    font-size: 1.3rem;
}

#message p {
    margin: 8px 0;
    opacity: 0;
    animation: fadeLine 1s forwards;
}

@keyframes fadeLine {
    to { opacity: 1; }
}

/* Buttons */
.actions {
    margin-top: 30px;
}

.actions button {
    margin: 8px;
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #ffd700, #ffb300);
    color: black;
    cursor: pointer;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- Background layers -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Hey Kadu ❤️</h1>
    <p class="tap-msg">Tap anywhere to start 💛</p>

    <div id="message"></div>

    <div class="actions">
        <button onclick="toggleAudio()">🎵 Play / Pause</button>
        <button onclick="restartMessage()">💬 Read Again</button>
        <button onclick="loveBurst()">❤️ I Love You</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mpeg">
</audio>

<script>
const lines = [
"I know sometimes it feels like my love is becoming less...",
"",
"But honestly, it's just life getting a little messy, not my heart.",
"",
"My love for you is still the same… actually more ❤️",
"",
"Like Krishna and Radha…",
"love is not always loud,",
"sometimes it's silent, deep, and always there.",
"",
"Yes, I get lazy sometimes 😅",
"Yes, I don’t always express perfectly…",
"",
"But one thing never changes —",
"You.",
"",
"I may not always get it right,",
"but I’m trying—and I really don’t want to lose you.",
"",
"I will understand you better,",
"and make you smile everyday 💖",
"",
"And one truth…",
"Even when I delay things 😄",
"I never delay loving you ❤️"
];

let delay = 0;

/* BACKGROUND IMAGES */
const backgrounds = [
"img1.jpeg",
"img2.jpeg",
"img3.jpeg"
];

let bgIndex = 0;
let currentBg = 1;

function changeBackground() {
    let next = currentBg === 1 ? 2 : 1;
    document.getElementById("bg" + next).style.backgroundImage = `url(${backgrounds[bgIndex]})`;
    document.getElementById("bg" + next).style.opacity = 1;
    document.getElementById("bg" + currentBg).style.opacity = 0;

    currentBg = next;
    bgIndex = (bgIndex + 1) % backgrounds.length;
}

/* Show lines */
function showLines() {
    const msg = document.getElementById("message");

    lines.forEach((line, i) => {
        setTimeout(() => {
            let p = document.createElement("p");
            p.innerText = line;

            if (line === "You.") {
                p.style.fontSize = "1.6rem";
                p.style.color = "#ffd700";
            }

            msg.appendChild(p);

            /* Change background every few lines */
            if (i % 6 === 0) changeBackground();

        }, delay);

        delay += line === "" ? 400 : 1200;
    });
}

/* Hearts */
function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "💛";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

/* Audio */
let started = false;
function startAudioOnce() {
    if (!started) {
        document.getElementById("bgMusic").play();
        started = true;
    }
}

function toggleAudio() {
    const music = document.getElementById("bgMusic");
    music.paused ? music.play() : music.pause();
}

/* Restart */
function restartMessage() {
    document.getElementById("message").innerHTML = "";
    delay = 0;
    showLines();
}

/* Love burst */
function loveBurst() {
    for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💛";
        heart.className = "heart";
        heart.style.left = (window.innerWidth/2 + (Math.random()*100-50)) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}

document.addEventListener("click", startAudioOnce);
document.addEventListener("touchstart", startAudioOnce);

/* Start */
window.onload = function() {
    changeBackground();
    showLines();
    startHearts();
};
</script>

</body>
</html>
